<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEACE QUEST 🎮</title>
  <meta name="description" content="Une aventure épique pour l'anniversaire de Peace." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div id="app">
    <div id="screen-container"></div>

    <div id="audio-controls">
      <button id="toggle-music" class="glass-btn" title="Toggle Music">
        <span class="icon">🎵</span>
      </button>
    </div>
  </div>

    <!-- Audio element for background music -->
    <audio id="bg-music" loop>
      <source src="/Ludovico Einaudi - Nuvole Bianche(MP3_160K).mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module" src="/main.js"></script>
</body>

</html>
